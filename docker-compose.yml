name: nexus-cortex

services:
  # Ollama - Local LLM inference with GPU support
  ollama:
    image: ollama/ollama:0.23.2
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=1
      - OLLAMA_GPU_LAYERS=999
      - OLLAMA_NUM_THREAD=16
      - OLLAMA_MAX_LOADED_MODELS=1          # Single model = more VRAM for context
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=8               # Better batching for concurrent requests
      - OLLAMA_FLASH_ATTENTION=1            # Enable flash attention for faster inference
      - OLLAMA_KV_CACHE_TYPE=q8_0           # Quantized KV cache saves ~50% VRAM
    runtime: nvidia
    restart: unless-stopped
    healthcheck:
      test: timeout 10s bash -c ':> /dev/tcp/127.0.0.1/11434' || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Qdrant - Vector database for RAG (optimized configuration)
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      # gRPC port for high-performance client connections
      - QDRANT__SERVICE__GRPC_PORT=6334
      # Performance tuning: max concurrent searches
      - QDRANT__SERVICE__MAX_SEARCH_THREADS=4
      # Storage optimization: enable mmap for large collections
      - QDRANT__STORAGE__MMAP_ADVICE=random
      # Enable WAL for durability with good performance
      - QDRANT__STORAGE__WAL__WAL_CAPACITY_MB=64
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: timeout 10s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis - Conversation memory and caching
  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --maxclients 1000 --requirepass ${REDIS_PASSWORD:-ragredis}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ragredis}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL - Relational database for metadata and analytics
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-raguser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ragpassword}
      - POSTGRES_DB=${POSTGRES_DB:-ragdb}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API - FastAPI with RAG pipeline
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # image: jconover/nexuscortex-backend:latest  # Uncomment to use Docker Hub image
    container_name: rag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./scripts:/scripts
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-ragredis}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-raguser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ragpassword}
      - POSTGRES_DB=${POSTGRES_DB:-ragdb}
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
      - ENABLE_PROMETHEUS_METRICS=true
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring (prometheus, grafana, alertmanager, dcgm-exporter) now lives in
  # the nexus-observability repo. Prometheus joins the `ai-stack` network from
  # there to scrape rag-backend:8000.

  # Frontend - React web UI
  frontend:
    image: jconover/nexuscortex-frontend:latest
    container_name: rag-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
    name: cortex-ollama
  qdrant_data:
    name: cortex-qdrant
  redis_data:
    name: cortex-redis
  postgres_data:
    name: cortex-postgres

networks:
  default:
    name: ai-stack
    external: true
